<div class="page-container">
  <div class="container-fluid">

    <div class="page-header">
      <div>
        <h2 class="title mb-1">Veterinarios</h2>
        <p class="text-muted mb-0">Gestión de profesionales y sus especialidades</p>
      </div>
      <div>
        <button class="btn btn-primary btn-icon shadow-sm"
                title="Nuevo veterinario">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filters-card">
      <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">

        <form class="row g-3 align-items-end flex-grow-1">

          <div class="col-md-4 col-lg-3">
            <label class="form-label text-muted" for="nombres">Nombres</label>
            <input id="nombres"
                   type="text"
                   class="form-control"
                   placeholder="Buscar por nombre"
                   [(ngModel)]="filterNombre"
                   name="nombres">
          </div>

          <div class="col-md-4 col-lg-3">
            <label class="form-label text-muted" for="especialidad">Especialidad</label>
            <input id="especialidad"
                   type="text"
                   class="form-control"
                   placeholder="Especialidad"
                   [(ngModel)]="filterEspecialidad"
                   name="especialidad">
          </div>

        </form>

        <div class="text-end">
          <button class="btn btn-outline-secondary btn-sm"
                  (click)="limpiarFiltros()">
            <i class="bi bi-x-circle me-1"></i>
            Limpiar filtros
          </button>
        </div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="table-responsive">
      <table class="table table-custom align-middle mb-0">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Especialidad</th>
          <th>Estado</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="veterinarios.length === 0">
          <td colspan="4" class="text-center text-muted py-4">
            No se encontraron resultados
          </td>
        </tr>

        <tr *ngFor="let v of veterinarios">
          <td>{{ v.nombre }}</td>
          <td>{{ v.especialidad }}</td>
          <td>
            <span class="badge"
                  [ngClass]="v.estado === 'Activo' ? 'bg-success' : 'bg-secondary'">
              {{ v.estado }}
            </span>
          </td>
          <td class="text-center actions-cell">

            <button class="btn btn-icon btn-outline-warning"
                    title="Editar">
              <i class="bi bi-pencil"></i>
            </button>

            <button class="btn btn-icon btn-outline-danger"
                    title="Eliminar">
              <i class="bi bi-trash"></i>
            </button>

          </td>
        </tr>

      </tbody>
      </table>
    </div>

  </div>
</div>
