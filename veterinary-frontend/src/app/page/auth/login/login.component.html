<div class="login-page">

  <div class="login-left">

    <div class="card">

      <div class="brand">
        <img src="assets/logo.png" alt="MasterDog" class="brand-image" />
      </div>

      <h1 class="login-title">
        Bienvenido a <span>MasterDog</span>
      </h1>

      <form class="login-form"
            (ngSubmit)="login()"
            #loginForm="ngForm"
            novalidate>

        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text"
                 name="username"
                 placeholder="jdoe@hospital.com"
                 [(ngModel)]="username"
                 required />
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password"
                 name="password"
                 placeholder="••••••••"
                 [(ngModel)]="password"
                 required />
        </div>

        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <div class="form-actions">
          <button type="submit" [disabled]="loginForm.invalid">
            Acceder
          </button>

          <a class="forgot-link">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

      </form>

      <div class="paws">
        <span>🐾</span>
        <span>🐾</span>
        <span>🐾</span>
        <span>🐾</span>
      </div>

    </div>

  </div>

  <div class="login-right"></div>

</div>
