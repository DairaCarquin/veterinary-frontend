<div>
  <h2>Gestión de Clientes</h2>

  <app-dynamic-table
    [columns]="columns"
    [data]="clients"
    [filters]="filters"
    [page]="page"
    [size]="size"
    [total]="total"
    [showActions]="true"
    [actions]="actions"
    (filterChange)="loadClients($event)"
    (pageChange)="onPageChange($event)"
    (sizeChange)="onSizeChange($event)"
    (actionClick)="handleAction($event)">
  </app-dynamic-table>
</div>

<div class="modal-overlay" *ngIf="showEditModal">
  <div class="modal">

    <h2>Actualizar Cliente</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input [(ngModel)]="selectedClient.firstName" />
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input [(ngModel)]="selectedClient.lastName" />
    </div>

    <div class="form-group">
      <label>Dni</label>
      <input [(ngModel)]="selectedClient.dni" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="selectedClient.email" />
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input [(ngModel)]="selectedClient.phone" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModals()">Cancelar</button>
      <button class="btn-primary" (click)="updateClient()">Guardar</button>
    </div>

  </div>
</div>

<div class="modal-overlay" *ngIf="showConfirmModal">
  <div class="confirm-card">

    <div class="confirm-icon">
      <mat-icon>
        {{ selectedClient?.enabled ? 'warning' : 'check_circle' }}
      </mat-icon>
    </div>

    <h3>
      {{ selectedClient?.enabled ? 'Desactivar Cliente' : 'Activar Cliente' }}
    </h3>

    <p>
      {{ selectedClient?.enabled
          ? 'El cliente dejará de tener acceso al sistema.'
          : 'El cliente volverá a estar habilitado.' }}
    </p>

    <div class="confirm-actions">
      <button class="btn-secondary" (click)="closeModals()">
        Cancelar
      </button>

      <button
        class="btn-danger"
        (click)="confirmToggle()">
        {{ selectedClient?.enabled ? 'Desactivar' : 'Activar' }}
      </button>
    </div>

  </div>
</div>
