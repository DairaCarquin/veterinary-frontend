<div class="header-container">
  <div>
    <div class="eyebrow" [ngClass]="currentMeta.accent">Caso {{ caseId }}</div>
    <h2>{{ currentMeta.title }}</h2>
    <p class="section-subtitle">{{ currentMeta.subtitle }}</p>
  </div>

  <button class="btn-add" (click)="openCreateModal()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<app-dynamic-table
  [columns]="columns"
  [data]="data"
  [page]="page"
  [size]="size"
  [total]="total"
  [showActions]="true"
  [actions]="actions"
  (actionClick)="handleAction($event)">
</app-dynamic-table>

<div class="modal-overlay" *ngIf="showCreateModal || showEditModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="eyebrow" [ngClass]="currentMeta.accent">Caso {{ caseId }}</div>
        <h2>{{ getModalTitle() }}</h2>
        <p>{{ currentMeta.subtitle }}</p>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group" *ngFor="let col of visibleColumns">
        <label>{{ col.label }}</label>
        <textarea
          [(ngModel)]="selectedItem[col.key]"
          [placeholder]="getFieldPlaceholder(col.key)"
          rows="4"></textarea>
        <small class="helper-text">Completa {{ col.label.toLowerCase() }} con informacion breve y clara.</small>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModals()">Cancelar</button>
      <button class="btn-primary" (click)="save()">Guardar</button>
    </div>

  </div>
</div>
