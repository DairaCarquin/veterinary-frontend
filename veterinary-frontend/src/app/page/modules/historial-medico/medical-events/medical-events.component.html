<div class="header-container">
  <h2>{{ type | uppercase }} - Caso {{ caseId }}</h2>

  <button class="btn-add" (click)="openCreateModal()">
    <mat-icon>add</mat-icon>
  </button>
</div>

<app-dynamic-table
  [columns]="columns"
  [data]="data"
  [page]="page"
  [size]="size"
  [total]="total"
  [showActions]="true"
  [actions]="actions"
  (actionClick)="handleAction($event)">
</app-dynamic-table>

<div class="modal-overlay" *ngIf="showCreateModal || showEditModal">
  <div class="modal">

    <h2>{{ selectedItem?.id ? 'Actualizar' : 'Crear' }}</h2>

    <div *ngFor="let col of columns">
      <div *ngIf="col.key !== 'id' && col.key !== 'createdAt'">
        <label>{{ col.label }}</label>
        <input [(ngModel)]="selectedItem[col.key]" />
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModals()">Cancelar</button>
      <button class="btn-primary" (click)="save()">Guardar</button>
    </div>

  </div>
</div>
